<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>DriveEase PH | Booking {{ car.brand }} {{ car.model }}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;800;900&family=Newsreader:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface": "#1a1c1c",
                        "secondary": "#476083",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed": "#d4e3ff",
                        "surface": "#f9f9f9",
                        "tertiary-fixed": "#ffdfa0",
                        "surface-container-highest": "#e2e2e2",
                        "on-tertiary-fixed": "#261a00",
                        "on-tertiary-fixed-variant": "#5c4300",
                        "on-secondary": "#ffffff",
                        "on-surface-variant": "#43474e",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#291c00",
                        "secondary-container": "#bdd6ff",
                        "primary-fixed": "#ffdfa0",
                        "inverse-surface": "#2f3131",
                        "on-primary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#2f486a",
                        "surface-variant": "#e2e2e2",
                        "inverse-on-surface": "#f1f1f1",
                        "on-error-container": "#93000a",
                        "on-primary-container": "#ab7f00",
                        "on-error": "#ffffff",
                        "surface-bright": "#f9f9f9",
                        "outline": "#74777f",
                        "on-secondary-fixed": "#001c3a",
                        "surface-tint": "#795900",
                        "on-background": "#1a1c1c",
                        "surface-container-low": "#f3f3f3",
                        "on-primary-fixed": "#261a00",
                        "inverse-primary": "#fbbc00",
                        "outline-variant": "#c4c6cf",
                        "surface-container-high": "#e8e8e8",
                        "primary-fixed-dim": "#fbbc00",
                        "primary-container": "#2a1c00",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#afc8f0",
                        "surface-container": "#eeeeee",
                        "tertiary-fixed-dim": "#fbbc00",
                        "background": "#f9f9f9",
                        "on-secondary-container": "#445d80",
                        "on-primary-fixed-variant": "#5c4300",
                        "tertiary": "#090500",
                        "primary": "#0a0500",
                        "surface-dim": "#dadada",
                        "on-tertiary-container": "#ab7f00"
                    },
                    fontFamily: {
                        "headline": ["Epilogue"],
                        "body": ["Newsreader"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .amber-gradient-btn { background: linear-gradient(135deg, #fbbc00 0%, #ab7f00 100%); }
    </style>
</head>
<body class="bg-surface font-body text-on-surface">
    <nav class="bg-[#f9f9f9]/80 backdrop-blur-xl sticky top-0 z-50 shadow-sm">
        <div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
            <div class="flex items-center gap-4">
                <a href="{{ url_for('home') }}" class="text-2xl font-black tracking-tighter text-[#001F3F] font-headline uppercase">DriveEase PH</a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-6 py-12">
        <form method="POST" enctype="multipart/form-data">
            <div class="flex flex-col lg:flex-row gap-10">
                <div class="flex-1 space-y-8">
                    <section class="bg-surface-container-low p-8 rounded-xl">
                        <h2 class="font-headline text-xl font-bold uppercase tracking-tight mb-6">1. Rental Details</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <input name="pickup_location" placeholder="Pickup Location" required class="w-full bg-surface-container-high border-none p-4 rounded-xl font-body" type="text" value="Manila Airport"/>
                            <input name="return_location" placeholder="Return Location" required class="w-full bg-surface-container-high border-none p-4 rounded-xl font-body" type="text" value="Manila Airport"/>
                            <input name="pickup_datetime" id="pickup_dt" required class="w-full bg-surface-container-high border-none p-4 rounded-xl font-body" type="datetime-local"/>
                            <input name="return_datetime" id="return_dt" required class="w-full bg-surface-container-high border-none p-4 rounded-xl font-body" type="datetime-local"/>
                        </div>
                    </section>

                    <section class="bg-surface-container-low p-8 rounded-xl">
                        <h2 class="font-headline text-xl font-bold uppercase tracking-tight mb-6">2. Renter Information</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <input name="first_name" required class="w-full bg-surface-container-high border-none p-4 rounded-xl font-body" value="{{ current_user.first_name }}" type="text" placeholder="First Name"/>
                            <input name="last_name" required class="w-full bg-surface-container-high border-none p-4 rounded-xl font-body" value="{{ current_user.last_name }}" type="text" placeholder="Last Name"/>
                            <input name="mobile" required class="w-full bg-surface-container-high border-none p-4 rounded-xl font-body" value="{{ current_user.mobile_number }}" type="tel" placeholder="Mobile Number"/>
                            <input name="email" required class="w-full bg-surface-container-high border-none p-4 rounded-xl font-body" value="{{ current_user.email }}" type="email" placeholder="Email"/>
                        </div>
                    </section>

                    <section class="bg-surface-container-low p-8 rounded-xl">
                        <h2 class="font-headline text-xl font-bold uppercase tracking-tight mb-6">3. Add-ons</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {% for addon in addons %}
                            <label class="bg-white p-4 rounded-xl flex items-center gap-4 cursor-pointer hover:bg-gray-50 transition-colors">
                                <input type="checkbox" name="addons" value="{{ addon.id }}" data-price="{{ addon.price_per_day }}" class="w-5 h-5 rounded border-gray-300 text-[#fbbc00] focus:ring-[#fbbc00]">
                                <div>
                                    <p class="font-headline font-bold text-sm uppercase">{{ addon.name }}</p>
                                    <p class="text-[10px] text-gray-500">₱{{ addon.price_per_day }} / day</p>
                                </div>
                            </label>
                            {% endfor %}
                        </div>
                    </section>

                    <section class="bg-surface-container-low p-8 rounded-xl">
                        <h2 class="font-headline text-xl font-bold uppercase tracking-tight mb-6">4. Driver's License</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-2">Front View</label>
                                <input type="file" name="license_front" required class="w-full text-xs" accept="image/*">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-2">Back View</label>
                                <input type="file" name="license_back" required class="w-full text-xs" accept="image/*">
                            </div>
                        </div>
                    </section>
                </div>

                <aside class="w-full lg:w-[360px]">
                    <div class="sticky top-28 bg-white p-8 rounded-3xl shadow-xl border border-surface-container space-y-6">
                        <img src="{{ car.image_url }}" class="w-full aspect-video object-cover rounded-2xl mb-4">
                        <h3 class="font-headline text-2xl font-black uppercase text-primary">{{ car.brand }} {{ car.model }}</h3>
                        <div class="space-y-4 py-4 border-y border-gray-100">
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">Duration</span>
                                <span id="duration_text" class="font-bold">1 Day(s)</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">Base Rental</span>
                                <span id="base_price_display" class="font-bold">₱0.00</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">Add-ons Total</span>
                                <span id="addons_price_display" class="font-bold">₱0.00</span>
                            </div>
                        </div>
                        <div class="flex justify-between items-end">
                            <span class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Total Price</span>
                            <span id="total_price_display" class="font-headline font-black text-3xl text-[#ab7f00]">₱0.00</span>
                        </div>
                        <button type="submit" class="w-full amber-gradient-btn text-white py-5 rounded-full font-headline font-black text-sm tracking-widest uppercase shadow-lg hover:shadow-xl transition-all active:scale-95">
                            Proceed to Payment
                        </button>
                    </div>
                </aside>
            </div>
        </form>
    </main>

    <script>
        const dailyRate = {{ car.daily_rate }};
        const pickupInput = document.getElementById('pickup_dt');
        const returnInput = document.getElementById('return_dt');
        const addonCheckboxes = document.querySelectorAll('input[name="addons"]');

        function updatePrices() {
            const pickup = new Date(pickupInput.value);
            const returnDate = new Date(returnInput.value);

            if (pickup && returnDate && returnDate > pickup) {
                const diffTime = Math.abs(returnDate - pickup);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) || 1;

                document.getElementById('duration_text').innerText = `${diffDays} Day(s)`;

                const basePrice = dailyRate * diffDays;
                document.getElementById('base_price_display').innerText = '₱' + basePrice.toLocaleString();

                let addonsTotal = 0;
                addonCheckboxes.forEach(cb => {
                    if (cb.checked) {
                        addonsTotal += parseFloat(cb.dataset.price) * diffDays;
                    }
                });
                document.getElementById('addons_price_display').innerText = '₱' + addonsTotal.toLocaleString();

                const total = basePrice + addonsTotal;
                document.getElementById('total_price_display').innerText = '₱' + total.toLocaleString();
            }
        }

        pickupInput.addEventListener('change', updatePrices);
        returnInput.addEventListener('change', updatePrices);
        addonCheckboxes.forEach(cb => cb.addEventListener('change', updatePrices));

        const now = new Date();
        now.setMinutes(0);
        now.setSeconds(0);
        now.setMilliseconds(0);
        pickupInput.value = now.toISOString().slice(0, 16);

        const tomorrow = new Date(now);
        tomorrow.setDate(tomorrow.getDate() + 1);
        returnInput.value = tomorrow.toISOString().slice(0, 16);

        updatePrices();
    </script>
</body>
</html>
