<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Payment — DriveEase PH</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;800;900&family=Newsreader:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .amber-gradient { background: linear-gradient(135deg, #fbbc00 0%, #ab7f00 100%); }
    </style>
</head>
<body class="bg-surface font-body text-on-surface">
    <header class="bg-[#f9f9f9]/80 backdrop-blur-xl shadow-sm sticky top-0 z-50">
        <div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
            <a href="{{ url_for('home') }}" class="text-2xl font-black tracking-tighter text-[#001F3F] font-headline uppercase">DriveEase PH</a>
        </div>
    </header>
    <main class="max-w-3xl mx-auto px-6 py-20 text-center">
        <div class="bg-white p-12 rounded-3xl shadow-xl space-y-8 border border-surface-container">
            <div class="w-20 h-20 bg-secondary-container text-on-secondary-container rounded-full flex items-center justify-center mx-auto shadow-inner">
                <span class="material-symbols-outlined text-4xl">payments</span>
            </div>
            <h1 class="font-headline text-4xl font-black text-primary uppercase tracking-tight">Complete Your Payment</h1>
            <p class="text-on-surface-variant italic">Securely pay for your rental via PayMongo.</p>

            <div class="bg-surface-container-low p-8 rounded-2xl text-left space-y-4 border border-surface-container">
                <div class="flex justify-between font-label text-[10px] uppercase tracking-[0.2em] font-bold text-on-surface-variant">
                    <span>Amount to Pay</span>
                    <span class="text-primary text-sm">₱{{ "{:,.2f}".format(booking.total_amount) }}</span>
                </div>
                <div class="flex justify-between text-[10px] font-label uppercase tracking-widest text-gray-400">
                    <span>Booking Reference</span>
                    <span>#DEPH-{{ booking.id }}</span>
                </div>
            </div>

            <form action="{{ url_for('checkout', booking_id=booking.id) }}" method="POST">
                <button type="submit" class="w-full amber-gradient text-white py-5 rounded-full font-headline font-black text-lg tracking-[0.2em] uppercase shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all active:scale-95">
                    Pay via PayMongo (GCash/Maya/Card)
                </button>
            </form>

            <div class="flex items-center justify-center gap-8 pt-8 opacity-30 grayscale filter">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/eb/GCash_logo.svg" alt="GCash" class="h-5">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a2/Maya_New_Logo.png" alt="Maya" class="h-5">
                <span class="font-label text-[9px] font-bold uppercase tracking-[0.2em]">VISA / MASTERCARD</span>
            </div>
        </div>
    </main>
</body>
</html>
